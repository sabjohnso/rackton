on: [push, pull_request]
name: CI
jobs:
  build:
    name: "Build on Racket '${{ matrix.racket-version }}' (${{ matrix.racket-variant }})"
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      fail-fast: false
      matrix:
        racket-version: ["stable", "current"]
        # CS only: Racket no longer distributes BC bundles (v9.2 is
        # CS-only), so setup-racket 404s on a BC install.  BC can now be
        # had only by building from source, which a pure-Racket project
        # does not need.
        racket-variant: ["CS"]
        include:
          - racket-version: current
            experimental: true
    steps:
      - uses: actions/checkout@v4
      - uses: Bogdanp/setup-racket@v1.15
        with:
          architecture: x64
          distribution: full
          variant: ${{ matrix.racket-variant }}
          version: ${{ matrix.racket-version }}
      - name: Installing rackton and its dependencies
        run: raco pkg install --no-docs --auto --name rackton
      - name: Compiling rackton and building its docs
        run: raco setup --check-pkg-deps --unused-pkg-deps rackton
      - name: Testing rackton
        # No -x: `-x` (--no-run-if-absent) runs nothing for a file that
        # has no `test` submodule, which silently skips the ~91% of our
        # tests that run at the top level (every native `#lang rackton`
        # suite ending in `(define main (run-io (run-suite …)))`).  The
        # default (-r) loads the module top level, so those tests run.
        run: raco test -p rackton
